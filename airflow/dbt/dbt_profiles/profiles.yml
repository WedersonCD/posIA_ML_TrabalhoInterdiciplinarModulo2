clusterpaperifg:
  target: dev
  outputs:
    dev:
      type: databricks
      database: "{{ env_var('DBT_DATABRICKS_DATABASE') }}"
      auth_type: token
      threads: 16
      schema: "{{ env_var('DBT_DATABRICKS_SCHEMA') }}"
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DBT_ENV_SECRET_DATABRICKS_TOKEN') }}"
